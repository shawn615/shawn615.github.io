<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seunghyeon's Homepage</title>
    <meta
      name="description"
      content="Seunghyeon Seo - AI research scientist and engineer working on computer vision, neural rendering, and generative models."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <header class="topbar">
      <div class="site-shell topbar-inner">
        <a class="site-name" href="index.html" data-site-title>Seunghyeon's Homepage</a>
        <nav class="site-nav">
          <a href="index.html" data-page-link="home">Home</a>
          <a href="publications.html" data-page-link="publications">Publications</a>
          <a href="experience.html" data-page-link="experience">Experience</a>
          <a href="blog.html" data-page-link="blog" data-nav="blog">Blog</a>
        </nav>
      </div>
    </header>

    <main class="site-main site-shell">
      <section class="home-intro">
        <div class="profile-copy">
          <h1 data-name>Seunghyeon Seo</h1>
          <p class="profile-title" id="profile-title"></p>
          <div class="profile-intro" id="profile-intro"></div>
          <p class="profile-links" id="profile-links"></p>
        </div>
        <div class="profile-image">
          <img id="profile-photo" src="Seunghyeon.jpeg" alt="Seunghyeon Seo" />
        </div>
      </section>

      <section class="content-section">
        <h2>News</h2>
        <ul class="news-list" id="news-list"></ul>
      </section>

      <section class="content-section">
        <h2>Selected Publications</h2>
        <div class="publication-list" id="selected-publications"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-shell">© <span data-name>Seunghyeon Seo</span></div>
    </footer>

    <script src="site-content.js"></script>
    <script src="main.js"></script>
  </body>
</html>
